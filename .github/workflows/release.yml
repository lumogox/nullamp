name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.sha }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  meta:
    name: Extract Version
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v6

      - name: Read version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep '^version' crates/nullamp-app/Cargo.toml | head -1 | sed 's/.*= "\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.label }}
    needs: meta
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS Apple Silicon
            runner: macos-latest
            target: aarch64-apple-darwin
            binary: target/aarch64-apple-darwin/release/nullamp
            asset: nullamp-macos-aarch64

          - label: Windows x64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            binary: target/x86_64-pc-windows-msvc/release/nullamp.exe
            asset: nullamp-windows-x64.exe

          - label: Linux x64
            runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            binary: target/x86_64-unknown-linux-gnu/release/nullamp
            asset: nullamp-linux-x64

    steps:
      - uses: actions/checkout@v6

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libxkbcommon-dev \
            libgl1-mesa-dev \
            libx11-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxi-dev \
            libwayland-dev \
            libfontconfig1-dev \
            pkg-config

      - name: Install Rust stable
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup target add ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --package nullamp-app --target ${{ matrix.target }}

      - name: Stage asset
        shell: bash
        run: cp ${{ matrix.binary }} ${{ matrix.asset }}

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.meta.outputs.tag }}
          VERSION: ${{ needs.meta.outputs.version }}
        shell: bash
        run: |
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --title "Nullamp v${VERSION}" \
              --generate-notes \
              --target "$GITHUB_SHA" \
            || true
          fi
          gh release upload "$TAG" ${{ matrix.asset }} --clobber
